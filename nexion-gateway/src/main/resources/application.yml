spring:
  application:
    name: nexion-gateway
  config:
    import:
      - optional:nacos:nexion-common.yaml
      - optional:nacos:${spring.application.name}.yaml
  cloud:
    gateway:
      routes:
        - id: bff-service
          uri: http://localhost:8100
          predicates:
            - Path=/api/bff/**
          filters:
            - StripPrefix=1
        - id: auth-service
          uri: http://localhost:8101
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1
        - id: compute-service
          uri: http://localhost:8102
          predicates:
            - Path=/api/compute/**
          filters:
            - StripPrefix=1
        - id: mission-service
          uri: http://localhost:8103
          predicates:
            - Path=/api/missions/**
          filters:
            - StripPrefix=1
        - id: commerce-service
          uri: http://localhost:8104
          predicates:
            - Path=/api/commerce/**
          filters:
            - StripPrefix=1
        - id: wallet-service
          uri: http://localhost:8105
          predicates:
            - Path=/api/wallet/**
          filters:
            - StripPrefix=1
        - id: team-service
          uri: http://localhost:8106
          predicates:
            - Path=/api/team/**
          filters:
            - StripPrefix=1
        - id: notification-service
          uri: http://localhost:8107
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=1
        - id: earnings-service
          uri: http://localhost:8108
          predicates:
            - Path=/api/earnings/**
          filters:
            - StripPrefix=1
        - id: openapi-service
          uri: http://localhost:8111
          predicates:
            - Path=/api/openapi/**
          filters:
            - StripPrefix=1
        - id: compliance-service
          uri: http://localhost:8109
          predicates:
            - Path=/api/compliance/**
          filters:
            - StripPrefix=1
        - id: system-service
          uri: http://localhost:8110
          predicates:
            - Path=/api/system/**
          filters:
            - StripPrefix=1
    nacos:
      username: ${NACOS_USERNAME:nacos}
      password: "${NACOS_PASSWORD:nacos}"
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        file-extension: yaml

server:
  port: 8090

nexion:
  gateway:
    rate-limit:
      enabled: ${NEXION_GATEWAY_RATE_LIMIT_ENABLED:true}
      anonymous-permits-per-minute: ${NEXION_GATEWAY_RATE_LIMIT_ANONYMOUS_PER_MINUTE:20}
      user-permits-per-minute: ${NEXION_GATEWAY_RATE_LIMIT_USER_PER_MINUTE:120}
      window-seconds: ${NEXION_GATEWAY_RATE_LIMIT_WINDOW_SECONDS:60}
