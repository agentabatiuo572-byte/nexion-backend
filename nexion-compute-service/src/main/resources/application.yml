spring:
  application:
    name: nexion-compute-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:nexion}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: "${MYSQL_PASSWORD:A123456789Z!@#}"
  config:
    import:
      - optional:nacos:nexion-common.yaml
      - optional:nacos:${spring.application.name}.yaml
  cloud:
    nacos:
      username: ${NACOS_USERNAME:nacos}
      password: "${NACOS_PASSWORD:nacos}"
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        file-extension: yaml

server:
  port: 8102

nexion:
  compute:
    auto-settle-earnings: ${NEXION_COMPUTE_AUTO_SETTLE_EARNINGS:true}
    task-completed-outbox-enabled: ${NEXION_COMPUTE_TASK_COMPLETED_OUTBOX_ENABLED:true}
    task:
      default-lease-seconds: ${NEXION_COMPUTE_TASK_DEFAULT_LEASE_SECONDS:300}
      default-max-attempts: ${NEXION_COMPUTE_TASK_DEFAULT_MAX_ATTEMPTS:3}
      retry:
        initial-backoff-seconds: ${NEXION_COMPUTE_TASK_RETRY_INITIAL_BACKOFF_SECONDS:30}
      maintenance:
        enabled: ${NEXION_COMPUTE_TASK_MAINTENANCE_ENABLED:false}
        batch-size: ${NEXION_COMPUTE_TASK_MAINTENANCE_BATCH_SIZE:20}
        initial-delay-ms: ${NEXION_COMPUTE_TASK_MAINTENANCE_INITIAL_DELAY_MS:10000}
        fixed-delay-ms: ${NEXION_COMPUTE_TASK_MAINTENANCE_FIXED_DELAY_MS:10000}
    device-state:
      ttl-seconds: ${NEXION_COMPUTE_DEVICE_STATE_TTL_SECONDS:30}
    device-fleet:
      default-active-slots: ${NEXION_COMPUTE_DEFAULT_ACTIVE_SLOTS:6}
  outbox:
    rocketmq:
      enabled: ${NEXION_OUTBOX_ROCKETMQ_ENABLED:false}
      name-server: ${NEXION_OUTBOX_ROCKETMQ_NAME_SERVER:${ROCKETMQ_NAME_SERVER:127.0.0.1:9876}}
      acl:
        enabled: ${NEXION_OUTBOX_ROCKETMQ_ACL_ENABLED:false}
        access-key: "${NEXION_OUTBOX_ROCKETMQ_ACCESS_KEY:}"
        secret-key: "${NEXION_OUTBOX_ROCKETMQ_SECRET_KEY:}"
        security-token: "${NEXION_OUTBOX_ROCKETMQ_SECURITY_TOKEN:}"
      order-paid-topic: ${NEXION_OUTBOX_ROCKETMQ_ORDER_PAID_TOPIC:nexion-order-paid}
      compute-consumer-group: ${NEXION_OUTBOX_ROCKETMQ_COMPUTE_GROUP:nexion-compute-order-paid}
      compute-task-completed-topic: ${NEXION_OUTBOX_ROCKETMQ_COMPUTE_TASK_COMPLETED_TOPIC:nexion-compute-task-completed}
      compute-producer-group: ${NEXION_OUTBOX_ROCKETMQ_COMPUTE_PRODUCER_GROUP:nexion-compute-outbox}
      consumer:
        max-retries: ${NEXION_OUTBOX_ROCKETMQ_CONSUMER_MAX_RETRIES:5}
  services:
    earnings-url: ${NEXION_EARNINGS_URL:http://localhost:8108}
    system-url: ${NEXION_SYSTEM_URL:http://localhost:8110}
