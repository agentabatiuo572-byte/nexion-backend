spring:
  application:
    name: nexion-openapi-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:nexion}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: "${MYSQL_PASSWORD:A123456789Z!@#}"
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:127.0.0.1}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      username: "${SPRING_DATA_REDIS_USERNAME:}"
      password: "${SPRING_DATA_REDIS_PASSWORD:}"
  config:
    import:
      - optional:nacos:nexion-common.yaml
      - optional:nacos:${spring.application.name}.yaml
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 3000
            readTimeout: 5000
    nacos:
      username: ${NACOS_USERNAME:nacos}
      password: "${NACOS_PASSWORD:nacos}"
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        file-extension: yaml

nexion:
  openapi:
    signature-window-seconds: ${NEXION_OPENAPI_SIGNATURE_WINDOW_SECONDS:300}
    nonce-ttl-seconds: ${NEXION_OPENAPI_NONCE_TTL_SECONDS:300}
    quota:
      enabled: ${NEXION_OPENAPI_QUOTA_ENABLED:true}
      default-qps-limit: ${NEXION_OPENAPI_DEFAULT_QPS_LIMIT:20}
      default-daily-limit: ${NEXION_OPENAPI_DEFAULT_DAILY_LIMIT:10000}
    webhook:
      allow-private-callbacks: ${NEXION_OPENAPI_WEBHOOK_ALLOW_PRIVATE_CALLBACKS:false}
      delivery:
        enabled: ${NEXION_OPENAPI_WEBHOOK_DELIVERY_ENABLED:false}
        batch-size: ${NEXION_OPENAPI_WEBHOOK_DELIVERY_BATCH_SIZE:20}
        max-retries: ${NEXION_OPENAPI_WEBHOOK_DELIVERY_MAX_RETRIES:5}
        initial-backoff-seconds: ${NEXION_OPENAPI_WEBHOOK_DELIVERY_INITIAL_BACKOFF_SECONDS:60}
        connect-timeout-ms: ${NEXION_OPENAPI_WEBHOOK_CONNECT_TIMEOUT_MS:2000}
        read-timeout-ms: ${NEXION_OPENAPI_WEBHOOK_READ_TIMEOUT_MS:5000}
        initial-delay-ms: ${NEXION_OPENAPI_WEBHOOK_DELIVERY_INITIAL_DELAY_MS:10000}
        fixed-delay-ms: ${NEXION_OPENAPI_WEBHOOK_DELIVERY_FIXED_DELAY_MS:10000}

server:
  port: 8111
