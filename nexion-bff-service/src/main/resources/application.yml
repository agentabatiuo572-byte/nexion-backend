spring:
  application:
    name: nexion-bff-service
  config:
    import:
      - optional:nacos:nexion-common.yaml
      - optional:nacos:${spring.application.name}.yaml
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 2000
            readTimeout: 4000
    nacos:
      username: ${NACOS_USERNAME:nacos}
      password: "${NACOS_PASSWORD:nacos}"
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        file-extension: yaml

server:
  port: 8100

nexion:
  bff:
    cache-ttl-seconds: ${NEXION_BFF_CACHE_TTL_SECONDS:3}
  services:
    commerce-url: ${NEXION_COMMERCE_URL:http://localhost:8104}
    compliance-url: ${NEXION_COMPLIANCE_URL:http://localhost:8109}
    compute-url: ${NEXION_COMPUTE_URL:http://localhost:8102}
    earnings-url: ${NEXION_EARNINGS_URL:http://localhost:8108}
    openapi-url: ${NEXION_OPENAPI_URL:http://localhost:8111}
    team-url: ${NEXION_TEAM_URL:http://localhost:8106}
    wallet-url: ${NEXION_WALLET_URL:http://localhost:8105}
