spring:
  application:
    name: nexion-compliance-service
  servlet:
    multipart:
      max-file-size: ${NEXION_COMPLIANCE_MULTIPART_MAX_FILE_SIZE:50MB}
      max-request-size: ${NEXION_COMPLIANCE_MULTIPART_MAX_REQUEST_SIZE:50MB}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:nexion}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: "${MYSQL_PASSWORD:A123456789Z!@#}"
  config:
    import:
      - optional:nacos:nexion-common.yaml
      - optional:nacos:${spring.application.name}.yaml
  cloud:
    nacos:
      username: ${NACOS_USERNAME:nacos}
      password: "${NACOS_PASSWORD:nacos}"
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        file-extension: yaml

server:
  port: 8109

nexion:
  storage:
    endpoint: ${NEXION_STORAGE_ENDPOINT:http://127.0.0.1:9000}
    access-key: "${NEXION_STORAGE_ACCESS_KEY:minioadmin}"
    secret-key: "${NEXION_STORAGE_SECRET_KEY:change_me}"
    bucket: ${NEXION_STORAGE_BUCKET:nexion}
  compliance:
    evidence:
      max-upload-size-bytes: ${NEXION_COMPLIANCE_EVIDENCE_MAX_UPLOAD_SIZE_BYTES:52428800}
      presign-expiry-seconds: ${NEXION_COMPLIANCE_EVIDENCE_PRESIGN_EXPIRY_SECONDS:900}
    kyc-expiry:
      enabled: ${NEXION_COMPLIANCE_KYC_EXPIRY_ENABLED:false}
      batch-size: ${NEXION_COMPLIANCE_KYC_EXPIRY_BATCH_SIZE:50}
      reviewer: ${NEXION_COMPLIANCE_KYC_EXPIRY_REVIEWER:system-kyc-expiry}
      initial-delay-ms: ${NEXION_COMPLIANCE_KYC_EXPIRY_INITIAL_DELAY_MS:30000}
      fixed-delay-ms: ${NEXION_COMPLIANCE_KYC_EXPIRY_FIXED_DELAY_MS:60000}
    risk:
      withdrawal-review-amount: ${NEXION_COMPLIANCE_WITHDRAWAL_REVIEW_AMOUNT:1000.000000}
      exchange-review-amount: ${NEXION_COMPLIANCE_EXCHANGE_REVIEW_AMOUNT:5000.000000}
      genesis-review-amount: ${NEXION_COMPLIANCE_GENESIS_REVIEW_AMOUNT:10000.000000}
      daily-review-count: ${NEXION_COMPLIANCE_DAILY_REVIEW_COUNT:3}
      blocked-regions: ${NEXION_COMPLIANCE_BLOCKED_REGIONS:}
      review-regions: ${NEXION_COMPLIANCE_REVIEW_REGIONS:}
      low-tier-review-amount: ${NEXION_COMPLIANCE_LOW_TIER_REVIEW_AMOUNT:100.000000}
      low-tier-levels: ${NEXION_COMPLIANCE_LOW_TIER_LEVELS:L0,L1}
      ip-daily-review-count: ${NEXION_COMPLIANCE_IP_DAILY_REVIEW_COUNT:10}
      device-daily-review-count: ${NEXION_COMPLIANCE_DEVICE_DAILY_REVIEW_COUNT:5}
  services:
    wallet-url: ${NEXION_WALLET_URL:http://localhost:8105}
  outbox:
    rocketmq:
      enabled: ${NEXION_OUTBOX_ROCKETMQ_ENABLED:false}
      name-server: ${NEXION_OUTBOX_ROCKETMQ_NAME_SERVER:${ROCKETMQ_NAME_SERVER:127.0.0.1:9876}}
      acl:
        enabled: ${NEXION_OUTBOX_ROCKETMQ_ACL_ENABLED:false}
        access-key: "${NEXION_OUTBOX_ROCKETMQ_ACCESS_KEY:}"
        secret-key: "${NEXION_OUTBOX_ROCKETMQ_SECRET_KEY:}"
        security-token: "${NEXION_OUTBOX_ROCKETMQ_SECURITY_TOKEN:}"
      risk-decision-finalized-topic: ${NEXION_OUTBOX_ROCKETMQ_RISK_DECISION_FINALIZED_TOPIC:nexion-risk-decision-finalized}
      compliance-producer-group: ${NEXION_OUTBOX_ROCKETMQ_COMPLIANCE_PRODUCER_GROUP:nexion-compliance-outbox}
      publisher:
        batch-size: ${NEXION_OUTBOX_ROCKETMQ_PUBLISHER_BATCH_SIZE:50}
