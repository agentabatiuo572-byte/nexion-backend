spring:
  application:
    name: nexion-commerce-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:nexion}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: "${MYSQL_PASSWORD:A123456789Z!@#}"
  config:
    import:
      - optional:nacos:nexion-common.yaml
      - optional:nacos:${spring.application.name}.yaml
  cloud:
    nacos:
      username: ${NACOS_USERNAME:nacos}
      password: "${NACOS_PASSWORD:nacos}"
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        file-extension: yaml

server:
  port: 8104

nexion:
  services:
    compute-url: ${NEXION_COMPUTE_URL:http://localhost:8102}
    wallet-url: ${NEXION_WALLET_URL:http://localhost:8105}
    compliance-url: ${NEXION_COMPLIANCE_URL:http://localhost:8109}
    system-url: ${NEXION_SYSTEM_URL:http://localhost:8110}
  payment:
    mock:
      secret: "${NEXION_PAYMENT_MOCK_SECRET:nexion-mock-payment-secret}"
      checkout-base-url: ${NEXION_PAYMENT_MOCK_CHECKOUT_BASE_URL:https://mock-pay.nexion.local/checkout}
      checkout-ttl-minutes: ${NEXION_PAYMENT_MOCK_CHECKOUT_TTL_MINUTES:15}
      signature-window-seconds: ${NEXION_PAYMENT_MOCK_SIGNATURE_WINDOW_SECONDS:300}
  outbox:
    rocketmq:
      enabled: ${NEXION_OUTBOX_ROCKETMQ_ENABLED:false}
      name-server: ${NEXION_OUTBOX_ROCKETMQ_NAME_SERVER:${ROCKETMQ_NAME_SERVER:127.0.0.1:9876}}
      acl:
        enabled: ${NEXION_OUTBOX_ROCKETMQ_ACL_ENABLED:false}
        access-key: "${NEXION_OUTBOX_ROCKETMQ_ACCESS_KEY:}"
        secret-key: "${NEXION_OUTBOX_ROCKETMQ_SECRET_KEY:}"
        security-token: "${NEXION_OUTBOX_ROCKETMQ_SECURITY_TOKEN:}"
      order-paid-topic: ${NEXION_OUTBOX_ROCKETMQ_ORDER_PAID_TOPIC:nexion-order-paid}
      producer-group: ${NEXION_OUTBOX_ROCKETMQ_PRODUCER_GROUP:nexion-commerce-outbox}
      publisher:
        batch-size: ${NEXION_OUTBOX_ROCKETMQ_PUBLISHER_BATCH_SIZE:50}
        initial-delay-ms: ${NEXION_OUTBOX_ROCKETMQ_PUBLISHER_INITIAL_DELAY_MS:5000}
        fixed-delay-ms: ${NEXION_OUTBOX_ROCKETMQ_PUBLISHER_FIXED_DELAY_MS:5000}
