spring:
  application:
    name: nexion-earnings-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:nexion}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: "${MYSQL_PASSWORD:A123456789Z!@#}"
  config:
    import:
      - optional:nacos:nexion-common.yaml
      - optional:nacos:${spring.application.name}.yaml
  cloud:
    nacos:
      username: ${NACOS_USERNAME:nacos}
      password: "${NACOS_PASSWORD:nacos}"
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        file-extension: yaml

server:
  port: 8108

nexion:
  earnings:
    auto-post-wallet: ${NEXION_EARNINGS_AUTO_POST_WALLET:true}
    earning-generated-outbox-enabled: ${NEXION_EARNINGS_EARNING_GENERATED_OUTBOX_ENABLED:true}
  outbox:
    rocketmq:
      enabled: ${NEXION_OUTBOX_ROCKETMQ_ENABLED:false}
      name-server: ${NEXION_OUTBOX_ROCKETMQ_NAME_SERVER:${ROCKETMQ_NAME_SERVER:127.0.0.1:9876}}
      acl:
        enabled: ${NEXION_OUTBOX_ROCKETMQ_ACL_ENABLED:false}
        access-key: "${NEXION_OUTBOX_ROCKETMQ_ACCESS_KEY:}"
        secret-key: "${NEXION_OUTBOX_ROCKETMQ_SECRET_KEY:}"
        security-token: "${NEXION_OUTBOX_ROCKETMQ_SECURITY_TOKEN:}"
      compute-task-completed-topic: ${NEXION_OUTBOX_ROCKETMQ_COMPUTE_TASK_COMPLETED_TOPIC:nexion-compute-task-completed}
      earnings-consumer-group: ${NEXION_OUTBOX_ROCKETMQ_EARNINGS_GROUP:nexion-earnings-compute-task-completed}
      earning-generated-topic: ${NEXION_OUTBOX_ROCKETMQ_EARNING_GENERATED_TOPIC:nexion-earning-generated}
      earnings-producer-group: ${NEXION_OUTBOX_ROCKETMQ_EARNINGS_PRODUCER_GROUP:nexion-earnings-outbox}
      consumer:
        max-retries: ${NEXION_OUTBOX_ROCKETMQ_CONSUMER_MAX_RETRIES:5}
  services:
    wallet-url: ${NEXION_WALLET_URL:http://localhost:8105}
