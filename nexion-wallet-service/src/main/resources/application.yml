spring:
  application:
    name: nexion-wallet-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:nexion}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: "${MYSQL_PASSWORD:A123456789Z!@#}"
  config:
    import:
      - optional:nacos:nexion-common.yaml
      - optional:nacos:${spring.application.name}.yaml
  cloud:
    nacos:
      username: ${NACOS_USERNAME:nacos}
      password: "${NACOS_PASSWORD:nacos}"
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        file-extension: yaml

server:
  port: 8105

nexion:
  wallet:
    withdrawal:
      broadcast:
        enabled: ${NEXION_WALLET_WITHDRAWAL_BROADCAST_ENABLED:false}
        batch-size: ${NEXION_WALLET_WITHDRAWAL_BROADCAST_BATCH_SIZE:20}
        max-retries: ${NEXION_WALLET_WITHDRAWAL_BROADCAST_MAX_RETRIES:5}
        initial-backoff-seconds: ${NEXION_WALLET_WITHDRAWAL_BROADCAST_INITIAL_BACKOFF_SECONDS:60}
  outbox:
    rocketmq:
      enabled: ${NEXION_OUTBOX_ROCKETMQ_ENABLED:false}
      name-server: ${ROCKETMQ_NAME_SERVER:127.0.0.1:9876}
      earning-generated-topic: ${NEXION_OUTBOX_ROCKETMQ_EARNING_GENERATED_TOPIC:nexion-earning-generated}
      risk-decision-finalized-topic: ${NEXION_OUTBOX_ROCKETMQ_RISK_DECISION_FINALIZED_TOPIC:nexion-risk-decision-finalized}
      wallet-consumer-group: ${NEXION_OUTBOX_ROCKETMQ_WALLET_GROUP:nexion-wallet-earning-generated}
      wallet-risk-consumer-group: ${NEXION_OUTBOX_ROCKETMQ_WALLET_RISK_GROUP:nexion-wallet-risk-decision-finalized}
      consumer:
        max-retries: ${NEXION_OUTBOX_ROCKETMQ_CONSUMER_MAX_RETRIES:5}
