spring:
  application:
    name: nexion-team-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:nexion}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: "${MYSQL_PASSWORD:A123456789Z!@#}"
  config:
    import:
      - optional:nacos:nexion-common.yaml
      - optional:nacos:${spring.application.name}.yaml
  cloud:
    nacos:
      username: ${NACOS_USERNAME:nacos}
      password: "${NACOS_PASSWORD:nacos}"
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        file-extension: yaml

server:
  port: 8106

nexion:
  gateway:
    internal-secret: ${NEXION_GATEWAY_INTERNAL_SECRET:nexion-local-gateway-secret}
  services:
    commerce-url: ${NEXION_COMMERCE_URL:http://localhost:8104}
    wallet-url: ${NEXION_WALLET_URL:http://localhost:8105}
  team:
    outbox:
      worker:
        enabled: ${NEXION_TEAM_OUTBOX_WORKER_ENABLED:true}
        batch-size: ${NEXION_TEAM_OUTBOX_WORKER_BATCH_SIZE:50}
        initial-delay-ms: ${NEXION_TEAM_OUTBOX_WORKER_INITIAL_DELAY_MS:5000}
        fixed-delay-ms: ${NEXION_TEAM_OUTBOX_WORKER_FIXED_DELAY_MS:5000}
  outbox:
    rocketmq:
      enabled: ${NEXION_OUTBOX_ROCKETMQ_ENABLED:false}
      name-server: ${NEXION_OUTBOX_ROCKETMQ_NAME_SERVER:${ROCKETMQ_NAME_SERVER:127.0.0.1:9876}}
      order-paid-topic: ${NEXION_OUTBOX_ROCKETMQ_ORDER_PAID_TOPIC:nexion-order-paid}
      consumer-group: ${NEXION_OUTBOX_ROCKETMQ_ORDER_PAID_GROUP:nexion-team-order-paid}
      consumer:
        max-retries: ${NEXION_OUTBOX_ROCKETMQ_CONSUMER_MAX_RETRIES:5}
        processing-timeout-seconds: ${NEXION_OUTBOX_ROCKETMQ_CONSUMER_PROCESSING_TIMEOUT_SECONDS:300}
